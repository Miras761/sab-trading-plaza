{% extends 'base.html' %}
{% block title %}Удалить объявление — SAB Trading Plaza{% endblock %}

{% block content %}
<div class="container" style="padding-top:2rem">
  <div class="delete-card">
    <div style="text-align:center; margin-bottom:2rem">
      <div style="font-size:3rem; margin-bottom:12px">🗑️</div>
      <div style="font-family:'Orbitron',monospace; font-size:1.2rem; color:#f87171; letter-spacing:2px">УДАЛИТЬ ОБЪЯВЛЕНИЕ</div>
      <div style="color:var(--text-muted); margin-top:8px; font-size:0.9rem">{{ listing.title }}</div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div style="font-weight:700; color:var(--text-secondary); margin-bottom:12px; font-size:0.9rem; text-transform:uppercase; letter-spacing:1px">
        Причина удаления:
      </div>

      {% for value, label in form.reason.field.choices %}
        <label class="reason-label">
          <input type="radio" name="reason" value="{{ value }}" class="reason-radio" {% if forloop.first %}checked{% endif %}>
          {{ label }}
        </label>
      {% endfor %}

      <div style="display:flex; gap:1rem; margin-top:2rem">
        <button type="submit" class="btn btn-danger" style="flex:1; justify-content:center; padding:14px; font-size:1rem">
          🗑️ Удалить
        </button>
        <a href="{% url 'listing_detail' listing.pk %}" class="btn btn-outline" style="padding:14px 24px">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
