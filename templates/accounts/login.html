{% extends 'base.html' %}
{% block title %}Вход — SAB Trading Plaza{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <div style="font-size:3rem">🧠</div>
      <div class="auth-title">SAB PLAZA</div>
      <div class="auth-sub">// Вход в систему //</div>
    </div>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-input" placeholder="Ваш логин" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px; font-size:1rem">
        ⚡ Войти
      </button>
    </form>

    <div class="divider">нет аккаунта?</div>
    <a href="{% url 'register' %}" class="btn btn-outline" style="width:100%; justify-content:center; padding:12px">
      🚀 Регистрация
    </a>
  </div>
</div>
{% endblock %}
