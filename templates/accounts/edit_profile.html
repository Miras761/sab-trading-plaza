{% extends 'base.html' %}
{% block title %}Редактировать профиль — SAB Trading Plaza{% endblock %}
{% block content %}
<div class="container" style="padding-top:2rem">
  <div class="form-card">
    <div class="page-title">👤 Мой профиль</div>
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}
      {% for field in form %}
        <div class="form-group">
          <label class="form-label">{{ field.label }}</label>
          {{ field }}
          {% for err in field.errors %}
            <div class="form-error">❌ {{ err }}</div>
          {% endfor %}
        </div>
      {% endfor %}
      <div style="display:flex; gap:1rem; margin-top:1.5rem">
        <button type="submit" class="btn btn-primary" style="flex:1; justify-content:center; padding:14px">
          ✅ Сохранить
        </button>
        <a href="{% url 'profile' request.user.username %}" class="btn btn-outline" style="padding:14px 24px">Отмена</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
